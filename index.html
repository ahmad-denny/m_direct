<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #060b14;
            --surface: #0d1520;
            --surface2: #111d2e;
            --border: #1a2d44;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --danger: #ef4444;
            --text: #e0eaf5;
            --text-dim: #5a7a96;
            --glow: 0 0 20px rgba(0,229,255,0.15);
            --font-mono: 'Share Tech Mono', monospace;
            --font-main: 'Exo 2', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 97%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ── HEADER ── */
        .header-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 18px 24px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: linear-gradient(135deg, rgba(0,229,255,0.05), rgba(124,58,237,0.05));
            box-shadow: var(--glow), inset 0 0 40px rgba(0,229,255,0.03);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .header-banner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .header-left h2 {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0,229,255,0.4);
        }

        .header-left h2 span { color: var(--text-dim); }

        .as-of-text {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .header-pulse {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent3);
        }

        .pulse-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent3);
            box-shadow: 0 0 10px var(--accent3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
        }

        .stat-card.cyan::before { background: var(--accent); }
        .stat-card.violet::before { background: var(--accent2); }
        .stat-card.green::before { background: var(--accent3); }
        .stat-card.red::before { background: var(--danger); }

        .stat-label {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 900;
            line-height: 1;
            color: var(--text);
        }

        .stat-card.cyan .stat-value { color: var(--accent); text-shadow: 0 0 15px rgba(0,229,255,0.3); }
        .stat-card.red .stat-value { color: var(--danger); text-shadow: 0 0 15px rgba(239,68,68,0.3); }

        /* ── FILTERS ── */
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        input, select {
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 13px;
            flex: 1;
            min-width: 140px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,229,255,0.1);
        }

        input::placeholder { color: var(--text-dim); }
        select option { background: var(--surface); color: var(--text); }

        #periodeFilter {
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* ── BUTTONS ── */
        .button-group-row { display: flex; gap: 8px; align-items: center; }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--bg);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .reset-btn { background: var(--accent3); }
        .print-btn { background: var(--accent2); color: white; }
        .back-btn { background: var(--danger); }

        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(0); }

        /* ── CHART ── */
        #chartWrapper {
            display: none;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--accent);
            border-radius: 10px;
            background: var(--surface);
            box-shadow: var(--glow);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        #chartTitle {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .close-chart-btn {
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .close-chart-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ── TABLE ── */
        .table-container {
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: auto;
            max-height: 600px;
            background: var(--surface);
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }

        thead tr { position: sticky; top: 0; z-index: 5; }

        th {
            background: var(--surface2);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 12px 14px;
            border-bottom: 2px solid var(--accent);
            border-right: 1px solid var(--border);
            white-space: nowrap;
            cursor: default;
        }

        th:last-child { border-right: none; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(0,229,255,0.04); }

        td {
            padding: 10px 14px;
            border-right: 1px solid var(--border);
            color: var(--text);
            font-size: 12px;
        }

        td:last-child { border-right: none; }

        .highlight-red { color: var(--danger); font-weight: 700; }
        .highlight-yes { color: var(--accent3); font-weight: 700; }

        .clickable-name {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            transition: text-shadow 0.2s;
        }

        .clickable-name:hover { text-shadow: 0 0 10px var(--accent); }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* ── MOBILE ── */
        @media screen and (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .stat-value { font-size: 20px; }
            .header-pulse { display: none; }

            .filter-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            #searchBox { grid-column: span 2; }

            .button-group-row {
                grid-column: span 2;
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .btn { width: 100%; justify-content: center; padding: 11px 8px; font-size: 11px; }

            table thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }

            tr {
                margin-bottom: 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                background: var(--surface);
                overflow: hidden;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                text-align: right;
                padding: 8px 12px;
                border: none;
                border-bottom: 1px solid rgba(26,45,68,0.8);
                word-break: break-word;
                border-right: none;
            }

            td::before {
                content: attr(data-label);
                flex: 0 0 45%;
                text-align: left;
                font-weight: 600;
                font-family: var(--font-mono);
                font-size: 10px;
                color: var(--text-dim);
                letter-spacing: 0.5px;
                padding-top: 2px;
            }

            td:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header-banner">
        <div class="header-left">
            <h2><span>M|</span>DIRECT PERFORMANCE <span>// SUMATERA</span></h2>
            <span id="asOfDisplay" class="as-of-text">LOADING DATA...</span>
        </div>
        <div class="header-pulse">
            <div class="pulse-dot"></div>
            LIVE DASHBOARD
        </div>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
        <div class="stat-card cyan">
            <div class="stat-label">Total Agents</div>
            <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card green">
            <div class="stat-label">Login MTD</div>
            <div class="stat-value" id="statLogin">—</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Not Login MTD</div>
            <div class="stat-value" id="statNotLogin">—</div>
        </div>
        <div class="stat-card violet">
            <div class="stat-label">Login Rate</div>
            <div class="stat-value" id="statRate">—</div>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="filter-container">
        <input type="text" id="searchBox" placeholder="⌕ Search name or code..." onkeyup="filterAndSearchTable()">
        <select id="periodeFilter" onchange="filterAndSearchTable()"><option value="">All Period</option></select>
        <select id="positionFilter" onchange="filterAndSearchTable()"><option value="">All Position</option></select>
        <select id="branchFilter" onchange="filterAndSearchTable()"><option value="">All Branch</option></select>
        <select id="zeroMTDFilter" onchange="filterAndSearchTable()">
            <option value="">Login MTD (All)</option>
            <option value="0">NOT Login MTD</option>
        </select>
        <div class="button-group-row">
            <button class="btn reset-btn" onclick="resetFilter()">↺ Reset</button>
            <button class="btn print-btn" onclick="printTable()">⎙ Print</button>
        </div>
    </div>

    <!-- CHART -->
    <div id="chartWrapper">
        <div class="chart-header">
            <h4 id="chartTitle">Performance Detail</h4>
            <button class="close-chart-btn" onclick="closeChart()">✕ Close</button>
        </div>
        <div style="height: 320px;"><canvas id="performanceChart"></canvas></div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let tableData = [];
    let myChart = null;

    Chart.defaults.color = '#5a7a96';
    Chart.defaults.borderColor = '#1a2d44';

    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            populateTable(data);
        })
        .catch(err => {
            console.error("Error loading JSON:", err);
            document.getElementById('asOfDisplay').textContent = 'ERROR LOADING DATASET.JSON';
        });

    function populateTable(data) {
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const branchFilter = document.getElementById('branchFilter');
        const periodeFilter = document.getElementById('periodeFilter');
        const positionFilter = document.getElementById('positionFilter');

        tableBody.innerHTML = '';
        let branches = new Set(), periods = new Set(), positions = new Set();

        if (data.length === 0) return;

        const headers = Object.keys(data[0]);
        tableHead.innerHTML = headers.map(h => `<th>${h}</th>`).join('');

        data.forEach(row => {
            let tr = document.createElement('tr');
            headers.forEach((header, index) => {
                let td = document.createElement('td');
                let val = (row[header] === null || row[header] === undefined) ? "" : row[header];
                td.textContent = val;
                td.setAttribute('data-label', header);

                if (index === 2) {
                    td.classList.add('clickable-name');
                    td.onclick = () => showChart(row);
                }
                if (header.toLowerCase().includes("mtd") && (val === "0" || val === 0)) td.classList.add("highlight-red");
                if (header.toLowerCase().includes("dtd") && val === "Y") td.classList.add("highlight-yes");
                if (header.toLowerCase().includes("dtd") && val === "N") td.classList.add("highlight-red");
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);

            if (row['Branch']) branches.add(row['Branch'].toString().trim());
            if (row['Period']) periods.add(row['Period'].toString().trim());
            const posColName = headers[3];
            if (row[posColName]) positions.add(row[posColName].toString().trim());
        });

        fillSelect(branchFilter, branches, 'All Branch', false);
        const sortedPeriods = Array.from(periods).sort((a, b) => new Date(b) - new Date(a));
        fillSelect(periodeFilter, sortedPeriods, 'All Period', true);
        if (sortedPeriods.length > 0) periodeFilter.value = sortedPeriods[0];

        fillPositionSelect(positionFilter, positions);
        filterAndSearchTable();
    }

    function fillSelect(el, dataArray, label, isSortedArray) {
        el.innerHTML = `<option value="">${label}</option>`;
        let finalData = isSortedArray ? dataArray : Array.from(dataArray).sort();
        finalData.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            el.appendChild(opt);
        });
    }

    function filterAndSearchTable() {
        const fPer = document.getElementById('periodeFilter').value;
        const asOfDisplay = document.getElementById('asOfDisplay');
        asOfDisplay.textContent = fPer !== "" ? `AS OF PERIOD // ${fPer}` : "ALL PERIODS";

        const sBox = document.getElementById('searchBox').value.toLowerCase();
        const fPos = document.getElementById('positionFilter').value;
        const fBranch = document.getElementById('branchFilter').value;
        const fMTD = document.getElementById('zeroMTDFilter').value;

        let total = 0, login = 0, notLogin = 0;

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const cells = row.cells;
            if (cells.length === 0) return;

            const matchSearch = cells[2].textContent.toLowerCase().includes(sBox) || cells[1].textContent.toLowerCase().includes(sBox);
            const matchBranch = !fBranch || cells[4].textContent.trim() === fBranch;
            const matchPer = !fPer || cells[0].textContent.trim() === fPer;
            let valMTD = cells[5].textContent.trim();
            const matchMTD = !fMTD || valMTD === fMTD;
            let matchPos = true;
            if (fPos === "RM_ALL") matchPos = cells[3].textContent.startsWith("RM");
            else if (fPos !== "") matchPos = (cells[3].textContent.trim() === fPos);

            const visible = matchSearch && matchPos && matchBranch && matchPer && matchMTD;
            row.style.display = visible ? "" : "none";

            if (visible) {
                total++;
                if (valMTD === "0" || valMTD === 0) notLogin++;
                else login++;
            }
        });

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statLogin').textContent = login;
        document.getElementById('statNotLogin').textContent = notLogin;
        document.getElementById('statRate').textContent = total > 0 ? Math.round((login / total) * 100) + '%' : '—';
    }

    function fillPositionSelect(el, set) {
        el.innerHTML = '<option value="">All Position</option><option value="RM_ALL">RM (All Group)</option>';
        Array.from(set).sort().forEach(v => {
            let opt = document.createElement('option');
            opt.value = v; opt.textContent = v;
            el.appendChild(opt);
        });
    }

    function resetFilter() {
        document.getElementById('searchBox').value = "";
        document.getElementById('positionFilter').value = "";
        document.getElementById('branchFilter').value = "";
        document.getElementById('zeroMTDFilter').value = "";
        const pF = document.getElementById('periodeFilter');
        if (pF.options.length > 1) pF.value = pF.options[1].value;
        filterAndSearchTable();
        closeChart();
    }

    function closeChart() { document.getElementById('chartWrapper').style.display = 'none'; }
    function printTable() { window.print(); }

    function showChart(rowData) {
        const wrapper = document.getElementById('chartWrapper');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        wrapper.style.display = 'block';
        document.getElementById('chartTitle').innerText = "DETAIL // " + (rowData['Marketing Name'] || "USER").toUpperCase();
        if (myChart) myChart.destroy();

        const findVal = (target) => {
            const keys = Object.keys(rowData);
            const foundKey = keys.find(k => k.toLowerCase().includes(target.toLowerCase()));
            if (foundKey) return parseFloat(rowData[foundKey].toString().replace(',', '.')) || 0;
            return 0;
        };

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total MTD', 'Daily Average'],
                datasets: [
                    {
                        label: 'Calls',
                        data: [findVal('MTD Call'), findVal('AVG Call')],
                        backgroundColor: 'rgba(0,229,255,0.25)',
                        borderColor: '#00e5ff',
                        borderWidth: 1.5,
                        borderRadius: 4
                    },
                    {
                        label: 'Visits',
                        data: [findVal('MTD Visit'), findVal('AVG Visit')],
                        backgroundColor: 'rgba(16,185,129,0.25)',
                        borderColor: '#10b981',
                        borderWidth: 1.5,
                        borderRadius: 4
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#5a7a96', font: { family: "'Share Tech Mono', monospace", size: 11 } } },
                    datalabels: {
                        anchor: 'end', align: 'top',
                        color: '#e0eaf5',
                        font: { weight: 'bold', family: "'Share Tech Mono', monospace", size: 11 }
                    }
                },
                scales: {
                    x: { grid: { color: '#1a2d44' }, ticks: { color: '#5a7a96', font: { family: "'Share Tech Mono', monospace" } } },
                    y: { grid: { color: '#1a2d44' }, ticks: { color: '#5a7a96', font: { family: "'Share Tech Mono', monospace" } } }
                }
            },
            plugins: [ChartDataLabels]
        });

        wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
</html>
