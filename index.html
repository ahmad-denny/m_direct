<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary-blue: #2563eb;
            --second-blue: #2564ebc2;
            --purple: #8b5cf6;
            --yellow: #d97706;
            --green: #10b981;
            --red: #ef4444;
            --font-main: 'Inter', sans-serif;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        body.dark-mode {
            --bg: #111827;
            --surface: #1f2937;
            --border: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --shadow-sm: none;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text-main);
            height: 100vh; /* Full viewport height */
            overflow: hidden; /* Prevent body scroll, handle inside container */
            font-size: 14px;
        }

        /* CONTAINER SCROLLABLE */
        .container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            margin: 0 auto;
            padding: 16px;
            overflow-y: auto; /* Scroll happens here */
            scroll-behavior: smooth;
        }

        /* HEADER - STICKY */
        .header-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            border: 1px solid var(--border);
            
            /* Sticky Logic */
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-title h2 { font-size: 20px; font-weight: 700; color: var(--primary-blue); margin-bottom: 2px; }
        .as-of-text { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .header-controls { display: flex; align-items: center; gap: 12px; }
        
        /* Icon Buttons */
        .icon-btn {
            background: transparent; 
            border: 0px solid var(--border); 
            color: var(--text-muted);
            width: 40px; height: 40px;
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { 
            background: var(--bg); 
            color: var(--primary-blue); 
            border-color: var(--primary-blue); 
        }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* STATS ROW - STICKY */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            padding-top: 4px; /* Spacer for shadow overlap */
            padding-bottom: 4px;
            
            /* Sticky Logic */
            position: sticky;
            top: 85px; /* Adjust based on header height approx */
            z-index: 90;
            background: var(--bg); /* Match body bg to cover table when scrolling */
            transition: background 0.3s;
        }

        .stat-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px 20px; display: flex; align-items: center; gap: 16px;
            box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
        }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .stat-card.cyan::before   { background: var(--primary-blue); }
        .stat-card.green::before  { background: var(--green); }
        .stat-card.red::before    { background: var(--red); }
        .stat-card.violet::before { background: var(--purple); }

        .stat-icon-wrapper {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .stat-icon-wrapper svg { width: 24px; height: 24px; }
        
        /* Colored Backgrounds for Icons */
        .stat-card.cyan .stat-icon-wrapper   { background: rgba(37, 99, 235, 0.1); }
        .stat-card.green .stat-icon-wrapper  { background: rgba(16, 185, 129, 0.1); }
        .stat-card.red .stat-icon-wrapper    { background: rgba(239, 68, 68, 0.1); }
        .stat-card.violet .stat-icon-wrapper { background: rgba(139, 92, 246, 0.1); }

        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--text-main); line-height: 1; }

        /* FILTER SECTION */
        .filter-container {
            background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
            padding: 20px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 12px;
            box-shadow: var(--shadow-sm); max-height: 500px; opacity: 1; overflow: hidden;
            transition: all 0.3s ease;
        }
        .filter-container.hidden {
            max-height: 0; opacity: 0; padding: 0 20px; margin-bottom: 0; border: none; pointer-events: none;
        }
        input, select {
            padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-main); font-family: var(--font-main); font-size: 13px;
            flex: 1; min-width: 180px; outline: none;
        }
        .btn-group { display: flex; gap: 8px; margin-left: auto; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-family: var(--font-main); font-weight: 600; font-size: 13px; color: white;
        }
        .reset-btn { background: var(--second-blue); }
        .reset-btn:hover { background: var(--primary-blue); }

        /* CHART WRAPPER */
        #chartWrapper {
            display: none; margin-bottom: 24px; padding: 24px; border: 1px solid var(--border);
            border-radius: 12px; background: var(--surface); box-shadow: var(--shadow-sm);
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #chartTitle { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .close-chart-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: 12px;
        }

        /* TABLE STYLES */
        .table-container {
            background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
            overflow-x: auto;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        
        table { 
            width: 100%; border-collapse: collapse; font-size: 13px; text-align: left;
            table-layout: fixed;
        }

        /* Column Widths */
        th:nth-child(1), td:nth-child(1) { width: 10%; }  /* Period */
        th:nth-child(2), td:nth-child(2) { width: 9%; }  /* Agent Code */
        th:nth-child(3), td:nth-child(3) { width: 18%; } /* Name */
        th:nth-child(4), td:nth-child(4) { width: 15%; } /* Position */
        th:nth-child(5), td:nth-child(5) { width: 14%; } /* Branch */
        th:nth-child(6), td:nth-child(6) { width: 8%; text-align: center; } /* Login MTD */
        th:nth-child(7), td:nth-child(7) { width: 8%; text-align: center; } /* DTD Login */
        th:nth-child(8), td:nth-child(8) { width: 8%; text-align: right; } /* MTD Call */
        th:nth-child(9), td:nth-child(9) { width: 8%; text-align: right; } /* AVG Call */
        th:nth-child(10), td:nth-child(10) { width: 8%; text-align: right; } /* MTD Visit */
        th:nth-child(11), td:nth-child(11) { width: 8%; text-align: right; } /* AVG Visit */

        thead tr { position: sticky; top: 0; z-index: 10; background: var(--surface); }

        th {
            background: #f9fafb; 
            color: var(--text-main);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            padding: 14px 12px;
            border-bottom: 2px solid var(--border);
            cursor: pointer; user-select: none;
            white-space: nowrap;
        }
        body.dark-mode th { background: #1f2937; color: var(--text-main); }
        
        td {
            padding: 12px 12px; color: var(--text-main); vertical-align: middle;
            border-bottom: 1px solid var(--border);
            white-space: normal; 
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f9fafb; }
        body.dark-mode tbody tr:hover { background: #374151; }

        .clickable-name { color: var(--primary-blue); font-weight: 600; cursor: pointer; }
        .highlight-red { color: var(--red); font-weight: 600; }
        .highlight-yes { color: var(--green); font-weight: 600; }

        .footer { text-align: center; padding: 24px 0 10px 0; font-size: 12px; color: var(--text-muted); }

        @media screen and (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; top: 75px; }
            .header-banner { flex-direction: column; align-items: flex-start; gap: 16px; }
            .filter-container { display: grid; grid-template-columns: 1fr; }
            table { table-layout: auto; min-width: 600px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
<div class="container">
    <!-- Header Section -->
    <div class="header-banner sticky">
        <div class="header-left">
            <img src="img/BMI.png" alt="Logo" class="logo" width="40" height="40" onerror="this.style.display='none'">

            <!-- Theme Toggle -->
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode" id="themeBtn">

            </button>
        </div>
    </div>

    <!-- Stats Row with Professional COLORED Icons -->
    <div class="stats-row sticky">
        <div class="stat-card cyan">
            <div class="stat-icon-wrapper">
                <!-- Users Icon (Blue) -->
                <svg viewBox="0 0 24 24" fill="#2563eb"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>

        <div class="stat-card green">
            <div class="stat-icon-wrapper">
                <!-- Check Circle Icon (Green) -->
                <svg viewBox="0 0 24 24" fill="#10b981"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>

            <div class="stat-icon-wrapper">
                <!-- Trending Up Icon (Purple) -->
                <svg viewBox="0 0 24 24" fill="#8b5cf6"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Login Rate</div>
                <div class="stat-value" id="statRate">—</div>
            </div>
        </div>
    </div>

    <!-- Filter Container -->
    <div class="filter-container hidden" id="filterContainer">
        <input type="text" id="searchBox" placeholder="Search name or code..." onkeyup="filterAndSearchTable()">
        <select id="periodeFilter" onchange="filterAndSearchTable()"><option value="">All Period</option></select>
        <select id="positionFilter" onchange="filterAndSearchTable()"><option value="">All Position</option></select>
        <select id="branchFilter"   onchange="filterAndSearchTable()"><option value="">All Branch</option></select>
        <select id="zeroMTDFilter"  onchange="filterAndSearchTable()">
            <option value="">Login MTD (All)</option>
            <option value="0">NOT Login MTD</option>
        </select>
        <div class="btn-group">
            <button class="btn reset-btn"  onclick="resetFilter()">↺ Reset</button>

    <!-- Chart Area -->
    <div id="chartWrapper">
        <div class="chart-header">
            <h4 id="chartTitle">Performance Detail</h4>
            <button class="close-chart-btn" onclick="closeChart()">✕ Close</button>
        </div>
        <div style="height:320px; position:relative;"><canvas id="performanceChart"></canvas></div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>

    <div class="footer">Optimized for Mobile & Web | RBPM - Region Sumatera</div>

<script>
    let tableData = [];
    let myChart = null;
    let headers = [];
    let currentSort = { col: -1, dir: 'asc' };

    const fallbackData = [
        {"Period": "Mei 2026", "Agent Code": "A001", "Marketing Name": "Andi Wijaya", "Position": "RM - Senior", "Branch": "Medan", "Login MTD": "22", "DTD Login": "Y", "MTD Call": "150", "AVG Call": "6.8", "MTD Visit": "45", "AVG Visit": "2.0"},
        {"Period": "Mei 2026", "Agent Code": "A002", "Marketing Name": "Budi Santoso", "Position": "RM - Junior", "Branch": "Palembang", "Login MTD": "18", "DTD Login": "Y", "MTD Call": "120", "AVG Call": "5.5", "MTD Visit": "30", "AVG Visit": "1.4"},
        {"Period": "Mei 2026", "Agent Code": "A003", "Marketing Name": "Citra Lestari", "Position": "CS - Officer", "Branch": "Pekanbaru", "Login MTD": "0", "DTD Login": "N", "MTD Call": "0", "AVG Call": "0.0", "MTD Visit": "0", "AVG Visit": "0.0"},
        {"Period": "Mei 2026", "Agent Code": "A004", "Marketing Name": "Dewi Sartika", "Position": "CS - Senior", "Branch": "Lampung", "Login MTD": "21", "DTD Login": "Y", "MTD Call": "165", "AVG Call": "7.5", "MTD Visit": "10", "AVG Visit": "0.5"},
        {"Period": "April 2026", "Agent Code": "A001", "Marketing Name": "Andi Wijaya", "Position": "RM - Senior", "Branch": "Medan", "Login MTD": "20", "DTD Login": "Y", "MTD Call": "140", "AVG Call": "7.0", "MTD Visit": "40", "AVG Visit": "2.0"}
    ];

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        const sunIcon = document.getElementById('icon-sun');
        const moonIcon = document.getElementById('icon-moon');
        
        if (isDark) {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        } else {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        }
        
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        if (myChart) {
            const textColor = isDark ? '#9ca3af' : '#6b7280';
            const gridColor = isDark ? '#374151' : '#e5e7eb';
            Chart.defaults.color = textColor;
            Chart.defaults.borderColor = gridColor;
            myChart.options.scales.x.grid.color = gridColor;
            myChart.options.scales.y.grid.color = gridColor;
            myChart.options.scales.x.ticks.color = textColor;
            myChart.options.scales.y.ticks.color = textColor;
            myChart.update();
        }
    }

    function toggleFilter() {
        const filterContainer = document.getElementById('filterContainer');
        filterContainer.classList.toggle('hidden');
    }

    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('icon-sun').style.display = 'none';
            document.getElementById('icon-moon').style.display = 'block';
        }
    })();

    const getDatasetUrl = () => {
        let base = window.location.href;
        if (base.startsWith('blob:')) base = base.replace(/^blob:/, '');
        try { return new URL('Dataset.json', base).href; } catch (e) { return 'Dataset.json'; }
    };

    const loadDataset = async () => {
        try {
            const url = getDatasetUrl();
            const response = await fetch(url);
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("text/html")) throw new Error("HTML received");
            const textData = await response.text();
            if (textData.trim().startsWith("<!DOCTYPE") || textData.trim().startsWith("<html")) throw new Error("HTML format");
            const data = JSON.parse(textData);
            tableData = data;
            populateTable(data);
        } catch (err) {
            console.warn("Using fallback data:", err);
            tableData = fallbackData;
            populateTable(fallbackData);
            document.getElementById('asOfDisplay').textContent = 'OFFLINE MODE (FALLBACK DATA)';
        }
    };

    loadDataset();

    function animateCounter(el, targetVal, suffix) {
        const end = parseFloat(targetVal);
        if (isNaN(end)) { el.textContent = targetVal; return; }
        const from = parseFloat(el.textContent) || 0;
        const duration = 550;
        const start = performance.now();
        (function step(now) {
            const t = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - t, 3);
            el.textContent = Math.round(from + (end - from) * ease) + (suffix || '');
            if (t < 1) requestAnimationFrame(step);
        })(start);
    }

    function updateStats(total, login, notLogin) {
        animateCounter(document.getElementById('statTotal'), total, '');
        animateCounter(document.getElementById('statLogin'), login, '');
        animateCounter(document.getElementById('statNotLogin'), notLogin, '');
        const rate = total > 0 ? Math.round((login / total) * 100) : null;
        if (rate !== null) animateCounter(document.getElementById('statRate'), rate, '%');
        else document.getElementById('statRate').textContent = '—';
    }

    function populateTable(data) {
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const branchFilter = document.getElementById('branchFilter');
        const periodeFilter = document.getElementById('periodeFilter');
        const posFilter = document.getElementById('positionFilter');

        tableBody.innerHTML = '';
        let branches = new Set(), periods = new Set(), positions = new Set();

        if (!data.length) return;
        headers = Object.keys(data[0]);

        tableHead.innerHTML = '';
        // Render Headers (Excluding Sparkline/Activity logic)
        headers.forEach((h, i) => {
            const th = document.createElement('th');
            th.innerHTML = `${h}<span class="sort-icon"></span>`;
            th.onclick = () => sortTable(i);
            tableHead.appendChild(th);
        });

        data.forEach(row => {
            const tr = document.createElement('tr');
            headers.forEach((header, index) => {
                const td = document.createElement('td');
                const val = (row[header] == null) ? "" : row[header];
                td.textContent = val;
                td.setAttribute('data-label', header);

                if (index === 2) { // Marketing Name column
                    td.classList.add('clickable-name');
                    td.onclick = () => showChart(row);
                }
                
                if (header.toLowerCase().includes("mtd") && (val === "0" || val === 0)) td.classList.add("highlight-red");
                if (header.toLowerCase().includes("dtd") && val === "Y") td.classList.add("highlight-yes");
                if (header.toLowerCase().includes("dtd") && val === "N") td.classList.add("highlight-red");
                
                tr.appendChild(td);
            });

            tableBody.appendChild(tr);

            if (row['Branch']) branches.add(row['Branch'].toString().trim());
            if (row['Period']) periods.add(row['Period'].toString().trim());
            const posCol = headers[3];
            if (row[posCol]) positions.add(row[posCol].toString().trim());
        });

        fillSelect(branchFilter, branches, 'All Branch', false);
        const parsePeriod = s => { const d = new Date(s); return isNaN(d) ? new Date(s.split(" ").reverse().join(" ")) : d; };
        const sortedPeriods = Array.from(periods).sort((a,b) => parsePeriod(b) - parsePeriod(a));
        fillSelect(periodeFilter, sortedPeriods, 'All Period', true);
        if (sortedPeriods.length) periodeFilter.value = sortedPeriods[0];

        fillPositionSelect(posFilter, positions);
        filterAndSearchTable();
    }

    function filterAndSearchTable() {
        const fPer = document.getElementById('periodeFilter').value;
        const sBox = document.getElementById('searchBox').value.toLowerCase();
        const fPos = document.getElementById('positionFilter').value;
        const fBranch = document.getElementById('branchFilter').value;
        const fMTD = document.getElementById('zeroMTDFilter').value;

        const displayEl = document.getElementById('asOfDisplay');
        if (displayEl.textContent !== 'OFFLINE MODE (FALLBACK DATA)') {
            displayEl.textContent = fPer ? `as of ${fPer}` : 'All Periods';
        }

        let total = 0, login = 0, notLogin = 0;

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const c = row.cells;
            if (!c || !c.length) return;

            // Adjusted indices based on removed Activity column
            // 0:Period, 1:Code, 2:Name, 3:Pos, 4:Branch, 5:LoginMTD
            const matchSearch = c[2].textContent.toLowerCase().includes(sBox) || c[1].textContent.toLowerCase().includes(sBox);
            const matchBranch = !fBranch || c[4].textContent.trim() === fBranch;
            const matchPer = !fPer || c[0].textContent.trim() === fPer;
            const valMTD = c[5].textContent.trim();
            const matchMTD = !fMTD || valMTD === fMTD;
            let matchPos = true;
            if (fPos === "RM_ALL") matchPos = c[3].textContent.startsWith("RM");
            else if (fPos === "CS_ALL") matchPos = c[3].textContent.startsWith("CS");
            else if (fPos !== "") matchPos = c[3].textContent.trim() === fPos;

            const visible = matchSearch && matchPos && matchBranch && matchPer && matchMTD;
            row.style.display = visible ? '' : 'none';

            if (visible) {
                total++;
                (valMTD === "0" || valMTD === 0) ? notLogin++ : login++;
            }
        });

        updateStats(total, login, notLogin);
    }

    function sortTable(colIndex) {
        const tbody = document.getElementById('tableBody');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const ths = document.querySelectorAll('#tableHead th');

        if (currentSort.col === colIndex) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        else { currentSort.col = colIndex; currentSort.dir = 'asc'; }

        ths.forEach((th, i) => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (i === colIndex) th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
        });

        rows.sort((a, b) => {
            const ca = a.cells[colIndex]?.textContent.trim() || '';
            const cb = b.cells[colIndex]?.textContent.trim() || '';
            const na = parseFloat(ca), nb = parseFloat(cb);
            const cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : ca.localeCompare(cb, undefined, { numeric: true });
            return currentSort.dir === 'asc' ? cmp : -cmp;
        });

        rows.forEach(r => tbody.appendChild(r));
    }

    function fillSelect(el, dataArray, label, isSortedArray) {
        el.innerHTML = `<option value="">${label}</option>`;
        const arr = isSortedArray ? dataArray : Array.from(dataArray).sort();
        arr.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
    }

    function fillPositionSelect(el, set) {
        el.innerHTML = '<option value="">All Position</option><option value="RM_ALL">RM (All Group)</option><option value="CS_ALL">CS (All Group)</option>';
        Array.from(set).sort().forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
    }

    function resetFilter() {
        ['searchBox','positionFilter','branchFilter','zeroMTDFilter'].forEach(id => document.getElementById(id).value = '');
        const pF = document.getElementById('periodeFilter');
        if (pF.options.length > 1) pF.value = pF.options[1].value;
        currentSort = { col: -1, dir: 'asc' };
        document.querySelectorAll('#tableHead th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
        filterAndSearchTable();
        closeChart();
    }

    function closeChart() { document.getElementById('chartWrapper').style.display = 'none'; }

    function showChart(rowData) {
        const wrapper = document.getElementById('chartWrapper');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        wrapper.style.display = 'block';
        
        const marketingName = rowData['Marketing Name'];
        document.getElementById('chartTitle').innerText = 'PROGRESS PERFORMANCE // ' + (marketingName || 'USER').toUpperCase();
            
        if (myChart) myChart.destroy();

        const historicalData = tableData.filter(item => item['Marketing Name'] === marketingName);
        const parsePeriodToDate = (periodStr) => {
            if (!periodStr) return new Date(0);
            let parsed = new Date(periodStr.trim());
            if (!isNaN(parsed)) return parsed;
            parsed = new Date("01 " + periodStr.trim());
            return isNaN(parsed) ? new Date(0) : parsed;
        };
        historicalData.sort((a, b) => parsePeriodToDate(a['Period']) - parsePeriodToDate(b['Period']));

        const labels = historicalData.map(item => item['Period'] || '—');
        const cleanVal = (item, keySubstring) => {
            const exactKey = Object.keys(item).find(k => k.toLowerCase().includes(keySubstring.toLowerCase()));
            if (!exactKey || item[exactKey] == null) return 0;
            const strVal = item[exactKey].toString().trim().replace(',', '.');
            return (strVal === '-' || strVal === '') ? 0 : (parseFloat(strVal) || 0);
        };

        const mtdCalls = historicalData.map(item => cleanVal(item, 'MTD Call'));
        const mtdVisits = historicalData.map(item => cleanVal(item, 'MTD Visit'));

        const isDark = document.body.classList.contains('dark-mode');
        const labelColor = isDark ? '#e5e7eb' : '#374151';
        const colorCall = '#2563eb';
        const colorVisit = '#10b981';

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: 'MTD Call', data: mtdCalls, borderColor: colorCall, backgroundColor: 'rgba(37, 99, 235, 0.1)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 4,
                        datalabels: { display: true, anchor: 'end', align: 'top', offset: 8, color: labelColor, font: { weight: '600', size: 11 }, formatter: (val) => val > 0 ? val : '0' }
                    },
                    { 
                        label: 'MTD Visit', data: mtdVisits, borderColor: colorVisit, backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 4,
                        datalabels: { display: true, anchor: 'start', align: 'bottom', offset: 8, color: labelColor, font: { weight: '600', size: 11 }, formatter: (val) => val > 0 ? val : '0' }
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                layout: { padding: { top: 25, bottom: 10 } },
                plugins: { legend: { labels: { color: labelColor, font: { size: 12 }, usePointStyle: true, boxWidth: 8 } }, datalabels: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: labelColor, font: { size: 11 } } },
                    y: { grid: { color: isDark ? '#374151' : '#e5e7eb', borderDash: [5, 5] }, ticks: { color: labelColor, font: { size: 11 } }, grace: '10%' }
                }
            },
            plugins: [ChartDataLabels]
        });
        wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
</body>
