<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M|Direct Performance Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary-blue: #2563eb;
            --second-blue: #2564ebc2;
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --font-main: 'Inter', sans-serif;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        body.dark-mode {
            --bg: #111827;
            --surface: #1f2937;
            --border: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --shadow-sm: none;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* PERBAIKAN UTAMA: Hapus height: 100vh dan overflow: hidden dari body */
        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            font-size: 14px;
            /* Izinkan scroll global agar footer tidak terpotong */
            overflow-y: auto; 
        }

        .container {
            width: 100%;
            max-width: 100%;
            /* Ubah height: 100% menjadi min-height agar container bisa memanjang ke bawah */
            min-height: 100vh; 
            margin: 0 auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px; 
        }

        /* HEADER */
        .header-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            flex-shrink: 0; 
        }

        .header-left-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .logo-wrapper { flex-shrink: 0; }
        
        .header-title { 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            flex: 1;
        }
        .header-title h2 { font-size: 18px; font-weight: 700; color: var(--primary-blue); margin-bottom: 0; line-height: 1.2; }
        .as-of-text { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .mobile-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .icon-btn {
            background: transparent; 
            border: 0; 
            color: var(--text-muted);
            width: 36px; height: 36px;
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
        }
        .icon-btn:hover { background: var(--bg); color: var(--primary-blue); }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* --- STATS ROW --- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px;
            flex-shrink: 0; 
        }

        .stat-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
        }
        .stat-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .stat-card.cyan::before   { background: var(--primary-blue); }
        .stat-card.green::before  { background: var(--green); }
        .stat-card.red::before    { background: var(--red); }
        .stat-card.violet::before { background: var(--purple); }

        .stat-icon-wrapper {
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .stat-icon-wrapper svg { width: 20px; height: 20px; }
        
        .stat-card.cyan .stat-icon-wrapper   { background: rgba(37, 99, 235, 0.1); }
        .stat-card.green .stat-icon-wrapper  { background: rgba(16, 185, 129, 0.1); }
        .stat-card.red .stat-icon-wrapper    { background: rgba(239, 68, 68, 0.1); }
        .stat-card.violet .stat-icon-wrapper { background: rgba(139, 92, 246, 0.1); }

        .stat-info { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--text-main); line-height: 1; }

        /* --- FILTER SECTION --- */
        .filter-container {
            background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
            padding: 12px; 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 10px;
            box-shadow: var(--shadow-sm); max-height: 500px; opacity: 1; overflow: hidden;
            transition: all 0.3s ease; flex-shrink: 0;
        }
        .filter-container.hidden { max-height: 0; padding: 0; border: none; margin: 0; pointer-events: none; }
        
        input, select {
            padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-main); font-family: var(--font-main); font-size: 13px;
            width: 100%; outline: none;
        }
        
        .btn-group { display: flex; width: 100%; }
        .btn { 
            padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 13px; color: white; background: var(--second-blue); width: 100%; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        /* Chart & Table Area */
        #chartWrapper {
            display: none; padding: 16px; border: 1px solid var(--border);
            border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-sm);
            flex-grow: 1; min-height: 0; overflow: hidden; position: relative;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #chartTitle { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .close-chart-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .canvas-container { position: relative; height: calc(100% - 30px); width: 100%; }

        .table-container {
            background: var(--surface); border-radius: 10px; border: 1px solid var(--border);
            box-shadow: var(--shadow-sm); 
            /* Desktop: Biarkan grow agar memenuhi layar */
            flex-grow: 1; 
            min-height: 0; 
            overflow-y: auto; overflow-x: auto; position: relative;
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }

        /* Column Widths Desktop */
        th:nth-child(1), td:nth-child(1) { width: 10%; }
        th:nth-child(2), td:nth-child(2) { width: 9%; }
        th:nth-child(3), td:nth-child(3) { width: 18%; }
        th:nth-child(4), td:nth-child(4) { width: 15%; }
        th:nth-child(5), td:nth-child(5) { width: 14%; }
        th:nth-child(6), td:nth-child(6) { width: 8%; text-align: center; }
        th:nth-child(7), td:nth-child(7) { width: 8%; text-align: center; }
        th:nth-child(8), td:nth-child(8) { width: 8%; text-align: right; }
        th:nth-child(9), td:nth-child(9) { width: 8%; text-align: right; }
        th:nth-child(10), td:nth-child(10) { width: 8%; text-align: right; }
        th:nth-child(11), td:nth-child(11) { width: 8%; text-align: right; }

        thead tr { position: sticky; top: 0; z-index: 10; background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        th {
            background: #f9fafb; color: var(--text-main); font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 8px;
            border-bottom: 2px solid var(--border); cursor: pointer; white-space: nowrap;
        }
        body.dark-mode th { background: #1f2937; }
        
        td {
            padding: 8px 8px; color: var(--text-main); vertical-align: middle;
            border-bottom: 1px solid var(--border); font-size: 12px; line-height: 1.3;
            white-space: normal; word-wrap: break-word;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: #f9fafb; }
        body.dark-mode tbody tr:hover { background: #374151; }

        .clickable-name { color: var(--primary-blue); font-weight: 600; cursor: pointer; }
        .highlight-red { color: var(--red); font-weight: 600; }
        .highlight-yes { color: var(--green); font-weight: 600; }

        .footer { 
            text-align: center; 
            padding: 12px 0; 
            font-size: 10px; 
            color: var(--text-muted); 
            flex-shrink: 0; 
            /* Pastikan footer punya background agar tidak transparan saat discroll */
            background: var(--bg); 
        }

        /* =========================================
           MOBILE OPTIMIZATION (PERBAIKAN DI SINI)
           ========================================= */
        @media screen and (max-width: 768px) {
            .header-banner { padding: 10px 12px; }
            .header-title h2 { font-size: 16px; }
            
            .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
            .stat-card { padding: 10px; gap: 8px; }
            .stat-value { font-size: 18px; }
            .stat-icon-wrapper { width: 32px; height: 32px; }
            .stat-icon-wrapper svg { width: 16px; height: 16px; }

            .filter-container { 
                grid-template-columns: 1fr 1fr; 
                gap: 8px; 
                padding: 10px;
            }
            
            .filter-container input, 
            .filter-container select {
                padding: 8px 10px;
                font-size: 12px;
            }

            .btn-group { grid-column: span 1; }
            .btn { padding: 8px; font-size: 12px; }

            /* SAMAKAN TINGGI CONTAINER TABEL DAN CHART */
            .table-container, 
            #chartWrapper {
                flex-grow: 0 !important;
                max-height: 60vh !important; /* Tinggi maksimal disamakan */
                min-height: 300px; /* Opsional: agar tidak terlalu gepeng jika data sedikit */
                overflow-y: auto;
                display: block; /* Pastikan display block saat aktif */
            }
        
            /* Khusus untuk Canvas agar mengisi penuh wrapper-nya */
            .canvas-container {
                height: calc(100% - 40px) !important; /* Kurangi tinggi header chart */
                width: 100%;
                position: relative;
            }
            
            table { table-layout: auto; min-width: 100%; }
            
            th:nth-child(2), td:nth-child(2) { display: none; }
            th:nth-child(7), td:nth-child(7) { display: none; }
            th:nth-child(10), td:nth-child(10) { display: none; }
            th:nth-child(11), td:nth-child(11) { display: none; }

            th:nth-child(1), td:nth-child(1) { width: 18%; font-size: 10px; } 
            th:nth-child(3), td:nth-child(3) { width: 25%; } 
            th:nth-child(4), td:nth-child(4) { width: 20%; font-size: 11px; } 
            
            th:nth-child(5), td:nth-child(5) { display: none; } 

            @media (min-width: 480px) {
                 th:nth-child(5), td:nth-child(5) { display: table-cell; width: 20%; }
                 th:nth-child(3), td:nth-child(3) { width: 22%; }
                 th:nth-child(4), td:nth-child(4) { width: 18%; }
            }

            th:nth-child(6), td:nth-child(6) { width: 12%; text-align: center; font-size: 11px; } 
            th:nth-child(8), td:nth-child(8) { width: 12%; text-align: right; font-size: 11px; } 
            th:nth-child(9), td:nth-child(9) { width: 12%; text-align: right; font-size: 11px; } 

            th { padding: 8px 4px; font-size: 10px; }
            td { padding: 6px 4px; font-size: 11px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
<div class="container">
    <!-- Header Section -->
    <div class="header-banner">
        <div class="header-left-group">
            <div class="logo-wrapper">
                <img src="img/BMI.png" alt="Logo" class="logo" width="36" height="36" onerror="this.style.display='none'">
            </div>
            <div class="header-title">
                <h2>M|Direct Performance</h2>
                <span id="asOfDisplay" class="as-of-text">LOADING DATA...</span>
            </div>
            <div class="mobile-controls">
                <button class="icon-btn" onclick="toggleFilter()" title="Show/Hide Filter">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
                
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode" id="themeBtn">
                    <svg id="icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
                    <svg id="icon-moon" style="display:none;" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card cyan">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="#2563eb"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Total Agents</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="#10b981"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Login MTD</div>
                <div class="stat-value" id="statLogin">—</div>
            </div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="#ef4444"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Not Login MTD</div>
                <div class="stat-value" id="statNotLogin">—</div>
            </div>
        </div>
        <div class="stat-card violet">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="#8b5cf6"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
            </div>
            <div class="stat-info">
                <div class="stat-label">Login Rate</div>
                <div class="stat-value" id="statRate">—</div>
            </div>
        </div>
    </div>

    <!-- Filter Container -->
    <div class="filter-container hidden" id="filterContainer">
        <input type="text" id="searchBox" placeholder="Search name..." onkeyup="filterAndSearchTable()">
        <select id="periodeFilter" onchange="filterAndSearchTable()"><option value="">All Period</option></select>
        <select id="positionFilter" onchange="filterAndSearchTable()"><option value="">All Position</option></select>
        <select id="branchFilter"   onchange="filterAndSearchTable()"><option value="">All Branch</option></select>
        <select id="zeroMTDFilter"  onchange="filterAndSearchTable()">
            <option value="">Login Status (All)</option>
            <option value="0">NOT Login MTD</option>
        </select>
        <div class="btn-group">
            <button class="btn reset-btn"  onclick="resetFilter()">↺ Reset</button>
        </div>
    </div>

    <!-- Chart Area -->
    <div id="chartWrapper">
        <div class="chart-header">
            <h4 id="chartTitle">Performance Detail</h4>
            <button class="close-chart-btn" onclick="closeChart()"> Close</button>
        </div>
        <div class="canvas-container">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <!-- Data Table -->
    <div class="table-container" id="dataTableContainer">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <div class="footer">Optimized for Mobile & Web | RBPM - Region Sumatera</div>
</div>

<script>
    let tableData = [];
    let myChart = null;
    let headers = [];
    let currentSort = { col: -1, dir: 'asc' };

    const columnLabels = {
        "Period": "PERIOD",
        "Agent Code": "NIK",
        "Marketing Name": "NAMA",
        "Position": "POSITION",
        "Branch": "BRANCH",
        "Login MTD": "LOGIN",
        "DTD Login": "DTD",
        "MTD Call": "CALL",
        "MTD Visit": "VISIT",
        "AVG Call": "AVG CALL",
        "AVG Visit": "AVG VISIT"
    };

    const fallbackData = [
        {"Period": "Mei 2026", "Agent Code": "A001", "Marketing Name": "Andi Wijaya", "Position": "RM - Senior", "Branch": "Medan", "Login MTD": "22", "DTD Login": "Y", "MTD Call": "150", "AVG Call": "6.8", "MTD Visit": "45", "AVG Visit": "2.0"},
        {"Period": "Mei 2026", "Agent Code": "A002", "Marketing Name": "Budi Santoso", "Position": "RM - Junior", "Branch": "Palembang", "Login MTD": "18", "DTD Login": "Y", "MTD Call": "120", "AVG Call": "5.5", "MTD Visit": "30", "AVG Visit": "1.4"},
        {"Period": "Mei 2026", "Agent Code": "A003", "Marketing Name": "Citra Lestari", "Position": "CS - Officer", "Branch": "Pekanbaru", "Login MTD": "0", "DTD Login": "N", "MTD Call": "0", "AVG Call": "0.0", "MTD Visit": "0", "AVG Visit": "0.0"},
        {"Period": "Mei 2026", "Agent Code": "A004", "Marketing Name": "Dewi Sartika", "Position": "CS - Senior", "Branch": "Lampung", "Login MTD": "21", "DTD Login": "Y", "MTD Call": "165", "AVG Call": "7.5", "MTD Visit": "10", "AVG Visit": "0.5"},
        {"Period": "April 2026", "Agent Code": "A001", "Marketing Name": "Andi Wijaya", "Position": "RM - Senior", "Branch": "Medan", "Login MTD": "20", "DTD Login": "Y", "MTD Call": "140", "AVG Call": "7.0", "MTD Visit": "40", "AVG Visit": "2.0"}
    ];

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        const sunIcon = document.getElementById('icon-sun');
        const moonIcon = document.getElementById('icon-moon');
        
        if (isDark) {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        } else {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
        }
        
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        if (myChart) {
            const textColor = isDark ? '#9ca3af' : '#6b7280';
            const gridColor = isDark ? '#374151' : '#e5e7eb';
            Chart.defaults.color = textColor;
            Chart.defaults.borderColor = gridColor;
            myChart.options.scales.x.grid.color = gridColor;
            myChart.options.scales.y.grid.color = gridColor;
            myChart.options.scales.x.ticks.color = textColor;
            myChart.options.scales.y.ticks.color = textColor;
            myChart.update();
        }
    }

    function toggleFilter() {
        const filterContainer = document.getElementById('filterContainer');
        filterContainer.classList.toggle('hidden');
    }

    (function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('icon-sun').style.display = 'none';
            document.getElementById('icon-moon').style.display = 'block';
        }
    })();

    const getDatasetUrl = () => {
        let base = window.location.href;
        if (base.startsWith('blob:')) base = base.replace(/^blob:/, '');
        try { return new URL('Dataset.json', base).href; } catch (e) { return 'Dataset.json'; }
    };

    const loadDataset = async () => {
        try {
            const url = getDatasetUrl();
            const response = await fetch(url);
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("text/html")) throw new Error("HTML received");
            const textData = await response.text();
            if (textData.trim().startsWith("<!DOCTYPE") || textData.trim().startsWith("<html")) throw new Error("HTML format");
            const data = JSON.parse(textData);
            tableData = data;
            populateTable(data);
        } catch (err) {
            console.warn("Using fallback data:", err);
            tableData = fallbackData;
            populateTable(fallbackData);
            document.getElementById('asOfDisplay').textContent = 'OFFLINE MODE (FALLBACK DATA)';
        }
    };

    loadDataset();

    function animateCounter(el, targetVal, suffix) {
        const end = parseFloat(targetVal);
        if (isNaN(end)) { el.textContent = targetVal; return; }
        const from = parseFloat(el.textContent) || 0;
        const duration = 550;
        const start = performance.now();
        (function step(now) {
            const t = Math.min((now - start) / duration, 1);
            const ease = 1 - Math.pow(1 - t, 3);
            el.textContent = Math.round(from + (end - from) * ease) + (suffix || '');
            if (t < 1) requestAnimationFrame(step);
        })(start);
    }

    function updateStats(total, login, notLogin) {
        animateCounter(document.getElementById('statTotal'), total, '');
        animateCounter(document.getElementById('statLogin'), login, '');
        animateCounter(document.getElementById('statNotLogin'), notLogin, '');
        const rate = total > 0 ? Math.round((login / total) * 100) : null;
        if (rate !== null) animateCounter(document.getElementById('statRate'), rate, '%');
        else document.getElementById('statRate').textContent = '—';
    }

    function populateTable(data) {
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const branchFilter = document.getElementById('branchFilter');
        const periodeFilter = document.getElementById('periodeFilter');
        const posFilter = document.getElementById('positionFilter');

        tableBody.innerHTML = '';
        let branches = new Set(), periods = new Set(), positions = new Set();

        if (!data.length) return;
        headers = Object.keys(data[0]);

        tableHead.innerHTML = '';
        headers.forEach((h, i) => {
            const th = document.createElement('th');
            const displayLabel = columnLabels[h] || h.toUpperCase();
            th.innerHTML = `${displayLabel}<span class="sort-icon"></span>`;
            th.onclick = () => sortTable(i);
            tableHead.appendChild(th);
        });

        data.forEach(row => {
            const tr = document.createElement('tr');
            headers.forEach((header, index) => {
                const td = document.createElement('td');
                const val = (row[header] == null) ? "" : row[header];
                td.textContent = val;
                td.setAttribute('data-label', columnLabels[header] || header);

                if (header === "Marketing Name" || index === 2) {
                    td.classList.add('clickable-name');
                    td.onclick = () => showChart(row);
                }
                
                if (header.toLowerCase().includes("mtd") && (val === "0" || val === 0)) td.classList.add("highlight-red");
                if (header.toLowerCase().includes("dtd") && val === "Y") td.classList.add("highlight-yes");
                if (header.toLowerCase().includes("dtd") && val === "N") td.classList.add("highlight-red");
                
                tr.appendChild(td);
            });

            tableBody.appendChild(tr);

            if (row['Branch']) branches.add(row['Branch'].toString().trim());
            if (row['Period']) periods.add(row['Period'].toString().trim());
            const posCol = headers.find(h => h.toLowerCase().includes('position')) || headers[3];
            if (row[posCol]) positions.add(row[posCol].toString().trim());
        });

        fillSelect(branchFilter, branches, 'All Branch', false);
        const parsePeriod = s => { const d = new Date(s); return isNaN(d) ? new Date(s.split(" ").reverse().join(" ")) : d; };
        const sortedPeriods = Array.from(periods).sort((a,b) => parsePeriod(b) - parsePeriod(a));
        fillSelect(periodeFilter, sortedPeriods, 'All Period', true);
        if (sortedPeriods.length) periodeFilter.value = sortedPeriods[0];

        fillPositionSelect(posFilter, positions);
        filterAndSearchTable();
    }

    function filterAndSearchTable() {
        const fPer = document.getElementById('periodeFilter').value;
        const sBox = document.getElementById('searchBox').value.toLowerCase();
        const fPos = document.getElementById('positionFilter').value;
        const fBranch = document.getElementById('branchFilter').value;
        const fMTD = document.getElementById('zeroMTDFilter').value;

        const displayEl = document.getElementById('asOfDisplay');
        if (displayEl.textContent !== 'OFFLINE MODE (FALLBACK DATA)') {
            displayEl.textContent = fPer ? `as of ${fPer}` : 'All Periods';
        }

        let total = 0, login = 0, notLogin = 0;
        
        const idxName = headers.findIndex(h => h === "Marketing Name" || h === "Name");
        const idxCode = headers.findIndex(h => h === "Agent Code" || h === "NIK");
        const idxBranch = headers.findIndex(h => h === "Branch");
        const idxPeriod = headers.findIndex(h => h === "Period");
        const idxPos = headers.findIndex(h => h.toLowerCase().includes('position'));
        const idxLogin = headers.findIndex(h => h === "Login MTD");

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const c = row.cells;
            if (!c || !c.length) return;

            const nameVal = idxName >= 0 ? c[idxName].textContent.toLowerCase() : "";
            const codeVal = idxCode >= 0 ? c[idxCode].textContent.toLowerCase() : "";
            const branchVal = idxBranch >= 0 ? c[idxBranch].textContent.trim() : "";
            const periodVal = idxPeriod >= 0 ? c[idxPeriod].textContent.trim() : "";
            const posVal = idxPos >= 0 ? c[idxPos].textContent.trim() : "";
            const loginVal = idxLogin >= 0 ? c[idxLogin].textContent.trim() : "";

            const matchSearch = nameVal.includes(sBox) || codeVal.includes(sBox);
            const matchBranch = !fBranch || branchVal === fBranch;
            const matchPer = !fPer || periodVal === fPer;
            const matchMTD = !fMTD || loginVal === fMTD;
            
            let matchPos = true;
            if (fPos === "RM_ALL") matchPos = posVal.startsWith("RM");
            else if (fPos === "CS_ALL") matchPos = posVal.startsWith("CS");
            else if (fPos !== "") matchPos = posVal === fPos;

            const visible = matchSearch && matchPos && matchBranch && matchPer && matchMTD;
            row.style.display = visible ? '' : 'none';

            if (visible) {
                total++;
                (loginVal === "0" || loginVal === 0) ? notLogin++ : login++;
            }
        });

        updateStats(total, login, notLogin);
    }

    function sortTable(colIndex) {
        const tbody = document.getElementById('tableBody');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        const ths = document.querySelectorAll('#tableHead th');

        if (currentSort.col === colIndex) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        else { currentSort.col = colIndex; currentSort.dir = 'asc'; }

        ths.forEach((th, i) => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (i === colIndex) th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
        });

        rows.sort((a, b) => {
            const ca = a.cells[colIndex]?.textContent.trim() || '';
            const cb = b.cells[colIndex]?.textContent.trim() || '';
            const na = parseFloat(ca), nb = parseFloat(cb);
            const cmp = (!isNaN(na) && !isNaN(nb)) ? na - nb : ca.localeCompare(cb, undefined, { numeric: true });
            return currentSort.dir === 'asc' ? cmp : -cmp;
        });

        rows.forEach(r => tbody.appendChild(r));
    }

    function fillSelect(el, dataArray, label, isSortedArray) {
        el.innerHTML = `<option value="">${label}</option>`;
        const arr = isSortedArray ? dataArray : Array.from(dataArray).sort();
        arr.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
    }

    function fillPositionSelect(el, set) {
        el.innerHTML = '<option value="">All Position</option><option value="RM_ALL">RM (All Group)</option><option value="CS_ALL">CS (All Group)</option>';
        Array.from(set).sort().forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; el.appendChild(o); });
    }

    function resetFilter() {
        ['searchBox','positionFilter','branchFilter','zeroMTDFilter'].forEach(id => document.getElementById(id).value = '');
        const pF = document.getElementById('periodeFilter');
        if (pF.options.length > 1) pF.value = pF.options[1].value;
        currentSort = { col: -1, dir: 'asc' };
        document.querySelectorAll('#tableHead th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
        filterAndSearchTable();
        closeChart();
    }

    function closeChart() { 
        document.getElementById('chartWrapper').style.display = 'none';
        document.getElementById('dataTableContainer').style.display = 'block';
    }

    function showChart(rowData) {
        const wrapper = document.getElementById('chartWrapper');
        const tableContainer = document.getElementById('dataTableContainer');
        const ctx = document.getElementById('performanceChart').getContext('2d');
        
        tableContainer.style.display = 'none';
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        
        const marketingName = rowData['Marketing Name'] || rowData['Name'];
        document.getElementById('chartTitle').innerText = 'PROGRESS // ' + (marketingName || 'USER').toUpperCase();
            
        if (myChart) myChart.destroy();

        const historicalData = tableData.filter(item => (item['Marketing Name'] || item['Name']) === marketingName);
        const parsePeriodToDate = (periodStr) => {
            if (!periodStr) return new Date(0);
            let parsed = new Date(periodStr.trim());
            if (!isNaN(parsed)) return parsed;
            parsed = new Date("01 " + periodStr.trim());
            return isNaN(parsed) ? new Date(0) : parsed;
        };
        historicalData.sort((a, b) => parsePeriodToDate(a['Period']) - parsePeriodToDate(b['Period']));

        const labels = historicalData.map(item => item['Period'] || '—');
        const cleanVal = (item, keySubstring) => {
            const exactKey = Object.keys(item).find(k => k.toLowerCase().includes(keySubstring.toLowerCase()));
            if (!exactKey || item[exactKey] == null) return 0;
            const strVal = item[exactKey].toString().trim().replace(',', '.');
            return (strVal === '-' || strVal === '') ? 0 : (parseFloat(strVal) || 0);
        };

        const mtdCalls = historicalData.map(item => cleanVal(item, 'MTD Call'));
        const mtdVisits = historicalData.map(item => cleanVal(item, 'MTD Visit'));

        const isDark = document.body.classList.contains('dark-mode');
        const labelColor = isDark ? '#e5e7eb' : '#374151';
        const colorCall = '#2563eb';
        const colorVisit = '#10b981';

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: 'Call', data: mtdCalls, borderColor: colorCall, backgroundColor: 'rgba(37, 99, 235, 0.1)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 3,
                        datalabels: { display: true, anchor: 'end', align: 'top', offset: 4, color: labelColor, font: { weight: '600', size: 9 }, formatter: (val) => val > 0 ? val : '0' }
                    },
                    { 
                        label: 'Visit', data: mtdVisits, borderColor: colorVisit, backgroundColor: 'rgba(16, 185, 129, 0.1)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 3,
                        datalabels: { display: true, anchor: 'start', align: 'bottom', offset: 4, color: labelColor, font: { weight: '600', size: 9 }, formatter: (val) => val > 0 ? val : '0' }
                    }
                ]
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false, // WAJIB FALSE AGAR MENGIKUTI UKURAN WRAPPER
                interaction: { mode: 'index', intersect: false },
                layout: { padding: { top: 10, bottom: 0, left: 0, right: 0 } },
                plugins: { 
                    legend: { labels: { color: labelColor, font: { size: 11 }, usePointStyle: true, boxWidth: 6, padding: 10 } }, 
                    datalabels: { display: false } 
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: labelColor, font: { size: 10 }, maxRotation: 45, minRotation: 0 } },
                    y: { grid: { color: isDark ? '#374151' : '#e5e7eb', borderDash: [5, 5] }, ticks: { color: labelColor, font: { size: 10 } }, grace: '10%' }
                }
            },
            plugins: [ChartDataLabels]
        });
    }
</script>
